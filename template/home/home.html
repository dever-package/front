{{ define "home.html" }}
<main class="home-shell">
  <section class="hero">
    <p class="eyebrow">Package Front</p>
    <h1>Template Render Demo</h1>
    <p class="summary">{{ .Data.demo.message }}</p>
    <dl class="meta">
      <div>
        <dt>Service</dt>
        <dd>{{ .Data.demo.title }}</dd>
      </div>
      <div>
        <dt>Rendered</dt>
        <dd>{{ .Data.demo.time }}</dd>
      </div>
    </dl>
  </section>

  <section class="panel">
    <div class="panel-header">
      <p class="eyebrow">Model</p>
      <h2>Front Accounts</h2>
    </div>
    <ul class="account-list">
      {{ range .Data.accounts.list }}
      <li>
        <span>{{ .name }}</span>
      </li>
      {{ else }}
      <li>
        <span>No accounts found</span>
      </li>
      {{ end }}
    </ul>
  </section>
</main>
{{ end }}
